name: Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint & Format ────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [arena-identity, arena-gateway, frontend]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint --if-present

      - name: Prettier check
        run: npm run format:check --if-present

  # ─── Security Audit ───────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [arena-identity, arena-gateway, frontend]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Fail on HIGH/CRITICAL, allow moderate in dev deps
      - name: npm audit
        run: npm audit --audit-level=high --production

  # ─── Identity Service Tests ───────────────────────────────────────────────
  test-identity:
    name: Identity Service Tests
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arena
          POSTGRES_PASSWORD: arena_test_pw
          POSTGRES_DB: arena_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: arena-identity

    env:
      NODE_ENV: test
      PORT: 3001
      DATABASE_URL: postgresql://arena:arena_test_pw@localhost:5432/arena_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-not-for-production

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: arena-identity/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply schema
        run: |
          PGPASSWORD=arena_test_pw psql \
            -h localhost -U arena -d arena_test \
            -f ../migrations/001_initial_schema.sql

      - name: Run tests
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: identity-test-results
          path: arena-identity/test-results/
          retention-days: 7

  # ─── Gateway Service Tests ────────────────────────────────────────────────
  test-gateway:
    name: Gateway Service Tests
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arena
          POSTGRES_PASSWORD: arena_test_pw
          POSTGRES_DB: arena_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: arena-gateway

    env:
      NODE_ENV: test
      PORT: 3002
      DATABASE_URL: postgresql://arena:arena_test_pw@localhost:5432/arena_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-not-for-production
      IDENTITY_SERVICE_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: arena-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply schema
        run: |
          PGPASSWORD=arena_test_pw psql \
            -h localhost -U arena -d arena_test \
            -f ../migrations/001_initial_schema.sql

      - name: Run tests
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-test-results
          path: arena-gateway/test-results/
          retention-days: 7

  # ─── Frontend Build Check ─────────────────────────────────────────────────
  test-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    needs: [lint]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check --if-present

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_GATEWAY_URL: http://localhost:3002
          NEXT_PUBLIC_IDENTITY_URL: http://localhost:3001

  # ─── Gate: all tests must pass ────────────────────────────────────────────
  all-tests-pass:
    name: All Tests Pass
    runs-on: ubuntu-latest
    needs: [lint, audit, test-identity, test-gateway, test-frontend]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All tests passed ✓"
