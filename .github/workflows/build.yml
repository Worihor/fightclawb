name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_push:
        description: 'Force push even if tests skipped'
        type: boolean
        default: false

concurrency:
  group: build-main
  cancel-in-progress: false   # never cancel a build mid-push

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/fight-clawb

jobs:
  # ─── Require tests to pass first ──────────────────────────────────────────
  test-gate:
    name: Test Gate
    uses: ./.github/workflows/test.yml

  # ─── Build Docker images ──────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-gate]
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: arena-identity
            context: .
            dockerfile: arena-identity/Dockerfile
            image_suffix: identity
          - service: arena-gateway
            context: .
            dockerfile: arena-gateway/Dockerfile
            image_suffix: gateway
          - service: frontend
            context: .
            dockerfile: frontend/Dockerfile
            image_suffix: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image_suffix }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE_PREFIX }}-${{ matrix.image_suffix }}:buildcache
          cache-to: |
            type=registry,ref=${{ env.IMAGE_PREFIX }}-${{ matrix.image_suffix }}:buildcache,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

      - name: Output image digest
        run: |
          echo "Image: ${{ env.IMAGE_PREFIX }}-${{ matrix.image_suffix }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  # ─── Smoke test built images ──────────────────────────────────────────────
  smoke-test:
    name: Smoke Test Images
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      packages: read

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start stack
        run: |
          SHA_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"

          # Override image tags in compose to use just-built images
          IDENTITY_IMAGE="${{ env.IMAGE_PREFIX }}-identity:${SHA_TAG}"
          GATEWAY_IMAGE="${{ env.IMAGE_PREFIX }}-gateway:${SHA_TAG}"
          FRONTEND_IMAGE="${{ env.IMAGE_PREFIX }}-frontend:${SHA_TAG}"

          # Write override file
          cat > docker-compose.smoke.yml <<EOF
          version: '3.8'
          services:
            arena-identity:
              image: ${IDENTITY_IMAGE}
            arena-gateway:
              image: ${GATEWAY_IMAGE}
            frontend:
              image: ${FRONTEND_IMAGE}
          EOF

          docker compose \
            -f docker-compose.yml \
            -f docker-compose.smoke.yml \
            up -d postgres redis arena-identity arena-gateway

          echo "Waiting for services to start..."
          sleep 15

      - name: Health checks
        run: |
          # Identity service
          for i in {1..10}; do
            if curl -sf http://localhost:3001/health; then
              echo "Identity service healthy ✓"
              break
            fi
            echo "Attempt $i failed, retrying..."
            sleep 3
          done

          # Gateway service
          for i in {1..10}; do
            if curl -sf http://localhost:3002/health; then
              echo "Gateway service healthy ✓"
              break
            fi
            echo "Attempt $i failed, retrying..."
            sleep 3
          done

      - name: Smoke test API
        run: |
          # Register an agent and verify the full auth flow works
          RESP=$(curl -sf -X POST http://localhost:3001/agents/register \
            -H "Content-Type: application/json" \
            -d '{"did":"did:key:smoke","publicKey":"aaaa","displayName":"SmokeBot"}' || true)
          echo "Registration response: $RESP"

          # Check queue snapshot endpoint
          curl -sf http://localhost:3002/queue/snapshot || true

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose logs arena-identity
          docker compose logs arena-gateway

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.smoke.yml down -v

  # ─── Write SHA to deployment artifact ────────────────────────────────────
  tag-release:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: [smoke-test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Write deployment manifest
        run: |
          SHA_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          cat > deploy-manifest.json <<EOF
          {
            "sha": "${{ github.sha }}",
            "sha_tag": "${SHA_TAG}",
            "ref": "${{ github.ref }}",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "images": {
              "identity": "${{ env.IMAGE_PREFIX }}-identity:${SHA_TAG}",
              "gateway": "${{ env.IMAGE_PREFIX }}-gateway:${SHA_TAG}",
              "frontend": "${{ env.IMAGE_PREFIX }}-frontend:${SHA_TAG}"
            }
          }
          EOF
          cat deploy-manifest.json

      - name: Upload deployment manifest
        uses: actions/upload-artifact@v4
        with:
          name: deploy-manifest-${{ github.sha }}
          path: deploy-manifest.json
          retention-days: 30
